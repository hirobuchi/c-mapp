name: Frontend SBOM and Vulnerability Scan (Secure)

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'   # 毎週月曜のみ実行（スパム防止）
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom-and-scan:
    runs-on: ubuntu-latest

    steps:
      # ✅ SHA固定推奨（例は可読性のためタグ記載）
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (exact version)
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Generate SBOM (CycloneDX 1.5)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --spec-version 1.5 \
            --output-file sbom.json

      # ✅ 公式 Action 使用（curl排除）
      - name: Scan SBOM with Grype (Official Action)
        id: grype
        uses: anchore/scan-action@v3
        with:
          sbom: sbom.json
          fail-build: false
          severity-cutoff: high

      - name: Save scan result
        if: always()
        run: |
          echo "${{ steps.grype.outputs.json }}" > grype-result.json

      # ✅ PRでは実行しない
      - name: Create or Update Issue if High/Critical found
        if: github.event_name != 'pull_request' && steps.grype.outputs.severity == 'high'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('grype-result.json', 'utf8');
            const issueTitle = '🔴 High/Critical 脆弱性検出 (Frontend)';
            const timestamp = new Date().toISOString();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vulnerability'
            });

            const existing = issues.find(i => i.title === issueTitle);

            const body = `
            ## 🚨 脆弱性検出

            **検出日時**: ${timestamp}

            \`\`\`json
            ${result}
            \`\`\`
            `;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `🔁 再スキャン実行: ${timestamp}`
              });

            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
                labels: ['security', 'vulnerability']
              });
            }