name: Frontend SBOM and Vulnerability Scan (Secure)

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node (exact version)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Generate SBOM (CycloneDX 1.5)
        run: |
          npx --no-install @cyclonedx/cyclonedx-npm \
            --spec-version 1.5 \
            --output-file sbom.json

      - name: Scan SBOM with Grype (Official Action)
        id: grype
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8
        with:
          sbom: sbom.json
          fail-build: true
          severity-cutoff: high
          output-format: json

      - name: Save scan result
        if: always()
        run: |
          echo "Output file path: ${{ steps.grype.outputs.json }}"
          cp "${{ steps.grype.outputs.json }}" grype-result.json
          cat grype-result.json

  create-or-update-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or Update Issue if High/Critical found
        if: github.event_name != 'pull_request' && steps.vulncheck.outputs.count != '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b

        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('grype-result.json', 'utf8');
            const issueTitle = '🔴 High/Critical 脆弱性検出 (Frontend)';
            const timestamp = new Date().toISOString();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'vulnerability'
            });

            const existing = issues.find(i => i.title === issueTitle);

            const body = `
            ## 🚨 脆弱性検出

            **検出日時**: ${timestamp}

            \`\`\`json
            ${result}
            \`\`\`
            `;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `🔁 再スキャン実行: ${timestamp}`
              });

            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
                labels: ['security', 'vulnerability']
              });
            }